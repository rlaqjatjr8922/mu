<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeTree - Premium Dark</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="header">
        <div class="container header-container">
            <div class="logo">
                <div class="logo-icon"><i data-lucide="audio-lines"></i></div>
                <span class="logo-text">VIBETREE</span>
            </div>
            <div class="search-container">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" placeholder="Search masterpiece sounds..." class="search-input">
            </div>
            <div class="user-actions">
                <button class="btn-signin">Sign In</button>
            </div>
        </div>
    </header>

    <main class="main-content container">
        <section class="hero">
            <h1 class="hero-title">
                S O N I C<br>P U L S E
            </h1>
            <p class="hero-subtitle">Immerse yourself in a curated dimension of boundless frequencies.</p>
        </section>

        <section class="content-layout">
            <aside class="sidebar">
                <nav class="sidebar-nav">
                    <a href="#" class="nav-item active">
                        <span>Discover</span>
                    </a>
                    <a href="#" class="nav-item">
                        <span>Global Top 50</span>
                        <i data-lucide="arrow-up-right" class="icon-micro"></i>
                    </a>
                    <a href="#" class="nav-item">
                        <span>New Releases</span>
                    </a>
                </nav>
                <div class="sidebar-desc">
                    <div style="display: flex; gap: 0.5rem; color: #fff; margin-bottom: 0.5rem; font-weight: 500;">
                        <i data-lucide="radio" style="width:18px;height:18px;color:#06b6d4"></i> Live Server
                    </div>
                    Curated directly from our elite global soundboard. Connect to the vibe.
                </div>
            </aside>

            <div class="grid-container" id="gridContainer">
                <!-- Cards populated by JS -->
            </div>
        </section>
    </main>
    <!-- Now Playing Bar -->
    <div class="player-bar" id="playerBar">
        <div class="player-left">
            <img src="" alt="" id="playerImg" class="player-img">
            <div class="player-info">
                <div class="player-title" id="playerTitle">Select a track</div>
                <div class="player-artist" id="playerArtist">-</div>
            </div>
        </div>
        <div class="player-center">
            <div class="player-controls">
                <i data-lucide="skip-back" class="player-icon"></i>
                <button class="btn-play-pause" id="playPauseBtn">
                    <i data-lucide="pause"></i>
                </button>
                <i data-lucide="skip-forward" class="player-icon"></i>
            </div>
            <div class="player-progress">
                <span class="time-current">0:00</span>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span class="time-total">3:45</span>
            </div>
        </div>
        <div class="player-right">
            <i data-lucide="volume-2" class="player-icon"></i>
            <div class="volume-bar">
                <div class="volume-fill"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
